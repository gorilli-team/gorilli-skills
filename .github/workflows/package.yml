name: Package Skill

on:
  push:
    tags:
      - '*@*'

jobs:
  package:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Extract skill name and version from tag
        id: tag
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          SKILL_NAME="${TAG%@*}"
          VERSION="${TAG#*@}"
          echo "skill_name=$SKILL_NAME" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Validate skill
        run: python scripts/validate_skill.py "skills/${{ steps.tag.outputs.skill_name }}"

      - name: Package skill
        run: python scripts/package_skill.py "skills/${{ steps.tag.outputs.skill_name }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "${{ steps.tag.outputs.skill_name }} v${{ steps.tag.outputs.version }}"
          files: dist/${{ steps.tag.outputs.skill_name }}.skill
          generate_release_notes: true
